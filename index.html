<!DOCTYPE html>
<html lang="en">

    <title>// access</title>
    <link rel="stylesheet" href="styles.css" />

    <div class="video-shell" aria-hidden="true">
      <video id="bgVideo" class="video-shell__video" playsinline preload="auto"></video>
    </div>

    <div class="vignette" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>

      <p class="display" id="displayName">H4rvey</p>

            <path
              fill="currentColor"
              d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.876 19.876 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418Z"

        </button>
        <a
          class="soc"
          href="https://www.youtube.com/@h4rvey372/"
          target="_blank"
          rel="noopener noreferrer"
          title="YouTube"
          aria-label="YouTube channel"
        >
          <svg class="soc__svg" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M23.5 6.2c-.3-1.1-1.1-1.9-2.2-2.2C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.3.5C1.6 4.3.8 5.1.5 6.2 0 8.2 0 12 0 12s0 3.8.5 5.8c.3 1.1 1.1 1.9 2.2 2.2 1.8.5 9.3.5 9.3.5s7.5 0 9.3-.5c1.1-.3 1.9-1.1 2.2-2.2.5-2 .5-5.8.5-5.8s0-3.8-.5-5.8zM9.5 15.5v-7l6 3.5-6 3.5z"
            />
          </svg>
        </a>
      </nav>

      <p class="sub" id="subLine">local_stream // no_ads</p>
    </main>

    <div class="dock" id="dock">
      <button type="button" class="ctrl ctrl--playing" id="playPauseBtn" aria-label="Pause" title="Play / pause">
        <svg class="ctrl__icon ctrl__icon--pause" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>
        <svg class="ctrl__icon ctrl__icon--play" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <path fill="currentColor" d="M8 5v14l11-7z" />
        </svg>
      </button>
      <button type="button" class="ctrl ctrl--next" id="nextBtn" aria-label="Next track" title="Next track">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M6 18h2V6H6v12zm3.5-6L18 6v12l-8.5-6zM16 8.33 18.5 12 16 15.67V8.33z"
          />
        </svg>
      </button>
    </div>

    <div class="dsc-backdrop" id="discordBackdrop" hidden></div>
    <div class="dsc-panel" id="discordPanel" role="dialog" aria-modal="true" aria-labelledby="dscTitle" hidden>
      <div class="dsc-panel__bar">
        <span class="dsc-panel__title" id="dscTitle">UPLINK</span>
        <span class="dsc-panel__blink">::</span>
        <button type="button" class="dsc-panel__x" id="discordClose" aria-label="Close">×</button>
      </div>
      <div class="dsc-panel__body">
        <p class="dsc-panel__label">discord_identifier</p>
        <p class="dsc-panel__handle">@hh2krazzy</p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
